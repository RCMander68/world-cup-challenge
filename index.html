<!DOCTYPE html>
<html lang="en">
<head>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>World Cup 2026 — Prediction League</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Narrow:wght@600;700&display=swap');
  :root{--navy:#0a1f3c;--navy2:#102a52;--ink:#06182f;--gold:#f4c430;--gold2:#ffd966;--green:#00c46a;--green-d:#00a058;--red:#e23744;--line:rgba(255,255,255,.12);--shadow:0 10px 30px rgba(0,0,0,.35);}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:'Archivo',-apple-system,sans-serif;background:radial-gradient(1200px 600px at 80% -10%,rgba(244,196,48,.16),transparent 60%),radial-gradient(900px 500px at -10% 20%,rgba(0,196,106,.14),transparent 55%),linear-gradient(180deg,var(--navy),var(--ink));background-attachment:fixed;color:#fff;min-height:100vh;overflow-x:hidden;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;background-image:repeating-linear-gradient(90deg,rgba(255,255,255,.025) 0 2px,transparent 2px 64px);mix-blend-mode:overlay;}
  .wrap{position:relative;z-index:1;max-width:600px;margin:0 auto;padding:0 14px 150px;}
  header{padding:20px 4px 6px;text-align:center;}
  .badge{display:inline-flex;align-items:center;gap:7px;font-family:'Archivo Narrow';font-weight:700;letter-spacing:.16em;text-transform:uppercase;font-size:11px;color:var(--ink);background:linear-gradient(180deg,var(--gold2),var(--gold));padding:5px 12px;border-radius:999px;box-shadow:var(--shadow);}
  h1{font-family:'Anton';font-weight:400;font-size:clamp(30px,10vw,48px);line-height:.92;margin:9px 0 2px;text-transform:uppercase;background:linear-gradient(180deg,#fff,#d7e3f5);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .sub{font-family:'Archivo Narrow';font-weight:700;letter-spacing:.2em;text-transform:uppercase;font-size:11.5px;color:var(--gold);}
  .leaguechip{margin-top:8px;display:inline-flex;align-items:center;gap:8px;font-size:12.5px;color:#c3d0e6;background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:999px;padding:6px 13px;}
  .leaguechip b{color:#fff;}
  .leaguechip .x{color:#8aa0c2;cursor:pointer;font-weight:800;}

  .card{background:linear-gradient(180deg,rgba(22,44,82,.9),rgba(13,30,58,.92));border:1px solid var(--line);border-radius:18px;padding:16px;margin:12px 0;box-shadow:var(--shadow);backdrop-filter:blur(6px);}
  .card h2{font-family:'Anton';font-weight:400;text-transform:uppercase;font-size:21px;margin:0 0 4px;}
  .card p.lead{margin:0 0 6px;color:#c3d0e6;font-size:13.5px;line-height:1.5;}

  .btn{appearance:none;border:0;cursor:pointer;font-family:'Archivo';font-weight:800;border-radius:13px;padding:14px 16px;font-size:15px;width:100%;transition:transform .08s,filter .15s;margin-top:8px;}
  .btn:active{transform:scale(.975);}
  .btn-gold{background:linear-gradient(180deg,var(--gold2),var(--gold));color:var(--ink);box-shadow:0 6px 18px rgba(244,196,48,.35);}
  .btn-green{background:linear-gradient(180deg,#19d97e,var(--green-d));color:#04261a;box-shadow:0 6px 18px rgba(0,196,106,.3);}
  .btn-ghost{background:rgba(255,255,255,.07);color:#fff;border:1px solid var(--line);}
  .btn-row{display:flex;gap:9px;}
  .btn-row .btn{font-size:13.5px;padding:12px;}

  .modetabs{display:flex;gap:6px;margin:14px 0 6px;background:rgba(0,0,0,.25);border:1px solid var(--line);border-radius:16px;padding:5px;}
  .modetab{flex:1;text-align:center;font-family:'Archivo Narrow';font-weight:700;letter-spacing:.03em;text-transform:uppercase;font-size:11.5px;padding:10px 4px;border-radius:11px;color:#b9c6dc;cursor:pointer;transition:.15s;}
  .modetab.active{background:linear-gradient(180deg,var(--gold2),var(--gold));color:var(--ink);font-weight:800;}

  .stagebar{display:flex;gap:7px;overflow-x:auto;padding:6px 2px 10px;margin:0 -4px;scrollbar-width:none;}
  .stagebar::-webkit-scrollbar{display:none;}
  .chip{flex:0 0 auto;font-family:'Archivo Narrow';font-weight:700;letter-spacing:.05em;text-transform:uppercase;font-size:12px;padding:9px 13px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:#b9c6dc;white-space:nowrap;cursor:pointer;transition:.15s;}
  .chip.active{background:linear-gradient(180deg,var(--gold2),var(--gold));color:var(--ink);border-color:transparent;font-weight:800;}
  .chip.locked{opacity:.4;}
  .chip .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-left:6px;vertical-align:middle;}
  .chip .lk{margin-left:5px;}

  .banner{border-radius:14px;padding:12px 14px;font-size:13px;line-height:1.5;margin:4px 0 10px;}
  .ko-welcome{position:relative;background:rgba(0,196,106,.12);border:1px solid rgba(0,196,106,.4);border-radius:14px;padding:13px 34px 13px 15px;margin:0 0 12px;}
  .ko-welcome-h{font-weight:800;color:#fff;font-size:14.5px;margin-bottom:4px;}
  .ko-welcome-b{font-size:12.5px;line-height:1.5;color:#cfeede;}
  .ko-welcome-b b{color:#fff;font-weight:700;}
  .ko-welcome-x{position:absolute;top:9px;right:11px;color:#8fcfae;font-size:14px;cursor:pointer;line-height:1;padding:3px;}
  .ko-welcome-x:hover{color:#fff;}
  .banner.open{background:rgba(0,196,106,.12);border:1px solid rgba(0,196,106,.35);color:#a9f0cf;}
  .banner.wait{background:rgba(244,196,48,.1);border:1px solid rgba(244,196,48,.3);color:#ffe7a6;}
  .banner.lock{background:rgba(226,55,68,.1);border:1px solid rgba(226,55,68,.3);color:#f7b7bd;}
  .banner b{color:#fff;}

  .group-head{display:flex;align-items:center;gap:10px;margin:18px 0 8px;}
  .group-tag{font-family:'Anton';font-size:19px;background:rgba(255,255,255,.08);border:1px solid var(--line);border-radius:10px;padding:3px 11px;}
  .group-head .gl{flex:1;height:1px;background:var(--line);}

  .match{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:15px;padding:11px 11px 9px;margin:9px 0;}
  .mdtag{text-align:center;font-family:'Archivo Narrow';font-weight:700;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#7d8fae;margin-bottom:7px;}
  .teams{display:grid;grid-template-columns:1fr 78px 1fr;align-items:center;gap:6px;}
  .team{display:flex;flex-direction:column;align-items:center;gap:3px;text-align:center;}
  .flag{font-size:27px;line-height:1;filter:drop-shadow(0 2px 3px rgba(0,0,0,.4));}
  .tname{font-family:'Archivo Narrow';font-weight:700;font-size:12.5px;line-height:1.05;}
  .vs{display:flex;align-items:center;justify-content:center;gap:5px;}
  .vs .dash{color:#7d8fae;font-family:'Anton';font-size:18px;}
  .score{width:44px;height:48px;border-radius:11px;border:1px solid var(--line);background:rgba(0,0,0,.28);color:#fff;text-align:center;font-family:'Anton';font-size:24px;-moz-appearance:textfield;}
  .score::-webkit-outer-spin-button,.score::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .score:focus{outline:2px solid var(--gold);border-color:var(--gold);background:rgba(0,0,0,.4);}
  .score.res:focus{outline-color:var(--green);border-color:var(--green);}
  .score:disabled{opacity:.5;}
  .verdict{text-align:center;margin-top:7px;font-family:'Archivo Narrow';font-weight:700;letter-spacing:.07em;text-transform:uppercase;font-size:10.5px;color:#8aa0c2;min-height:13px;}
  .verdict.win{color:var(--green);}.verdict.draw{color:var(--gold);}
  .actbar{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);}
  .actbar .act{font-family:'Archivo Narrow';font-weight:700;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:#b9c6dc;}
  .actbar .act b{color:#fff;font-family:'Anton';font-size:14px;letter-spacing:0;}
  .actbar .ptpill{font-family:'Anton';font-size:13px;color:var(--ink);background:var(--gold);border-radius:7px;padding:2px 9px;}
  .actbar .ptpill.zero{background:rgba(255,255,255,.16);color:#9fb0cc;}
  .actbar .ptpill.six{background:var(--green);color:#04261a;}
  .revealtap{margin-top:8px;text-align:center;font-family:'Archivo Narrow';font-weight:700;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--gold);cursor:pointer;padding:6px;border-top:1px dashed var(--line);}
  .revealtap:active{opacity:.6;}
  .ptbadge{display:inline-block;margin-left:8px;font-family:'Anton';font-size:12px;color:var(--ink);background:var(--gold);border-radius:6px;padding:1px 7px;vertical-align:middle;}
  .ptbadge.zero{background:rgba(255,255,255,.15);color:#9fb0cc;}
  .lockicon{text-align:center;font-size:10px;color:#8aa0c2;margin-top:4px;font-family:'Archivo Narrow';font-weight:700;text-transform:uppercase;letter-spacing:.08em;}

  .ltable{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:6px;}
  .ltable th{font-family:'Archivo Narrow';font-weight:700;letter-spacing:.04em;text-transform:uppercase;font-size:10px;color:#8aa0c2;padding:6px 3px;text-align:center;border-bottom:1px solid var(--line);}
  .ltable th.tl,.ltable td.tl{text-align:left;}
  .ltable td{padding:7px 3px;text-align:center;border-bottom:1px solid rgba(255,255,255,.06);}
  .ltable td.tl{font-family:'Archivo Narrow';font-weight:700;font-size:12.5px;}
  .ltable td.pts{font-family:'Anton';color:var(--gold);font-size:15px;}
  .ltable tr.q1 td.pos,.ltable tr.q2 td.pos{color:var(--green);font-weight:800;}
  .ltable tr.q3 td.pos{color:var(--gold);font-weight:800;}
  .ltable .miniflag{font-size:15px;margin-right:5px;}
  .qkey{font-size:10.5px;color:#8aa0c2;margin-top:7px;line-height:1.5;}
  .qkey b{color:var(--green);}.qkey i{color:var(--gold);font-style:normal;}

  .ko-match{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:15px;padding:11px;margin:9px 0;}
  .ko-match .lbl{font-family:'Archivo Narrow';font-weight:700;letter-spacing:.07em;text-transform:uppercase;font-size:10.5px;color:#8aa0c2;margin-bottom:8px;display:flex;justify-content:space-between;gap:8px;}
  .ko-match .ko-when{font-weight:600;color:var(--gold);text-transform:none;letter-spacing:0;font-size:10px;white-space:nowrap;}
  .ko-side .tn.shortlist{font-size:11px;line-height:1.25;color:#cdd9ec;}
  .ko-side .tn.feeder{font-size:10.5px;line-height:1.25;color:#9fb0cc;font-style:italic;}
  .ko-side .tn.shortlist .orsep{color:var(--gold);font-style:italic;font-weight:600;font-size:9px;}
  .ko-teams{display:grid;grid-template-columns:1fr 78px 1fr;gap:6px;align-items:center;}
  .ko-side{display:flex;flex-direction:column;align-items:center;gap:3px;text-align:center;}
  .ko-side .tn{font-family:'Archivo Narrow';font-weight:700;font-size:12px;line-height:1.1;}
  .ko-side.tbd .tn{color:#5f7a9c;}
  .penwrap{display:flex;gap:6px;justify-content:center;align-items:center;margin-top:7px;}
  .penwrap input{width:38px;height:34px;text-align:center;border-radius:9px;border:1px solid var(--line);background:rgba(0,0,0,.25);color:#fff;font-family:'Anton';font-size:16px;}
  .penwrap span{font-size:10px;color:#8aa0c2;font-family:'Archivo Narrow';font-weight:700;text-transform:uppercase;}
  .winner-pill{margin-top:7px;text-align:center;font-family:'Archivo Narrow';font-weight:700;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--green);}

  label.fld{display:block;margin:12px 0 6px;font-family:'Archivo Narrow';font-weight:700;letter-spacing:.07em;text-transform:uppercase;font-size:12px;color:var(--gold);}
  select,input.txt{width:100%;padding:13px;border-radius:12px;border:1px solid var(--line);background:rgba(0,0,0,.28);color:#fff;font-family:'Archivo';font-size:16px;font-weight:600;}
  select:focus,input.txt:focus{outline:2px solid var(--gold);border-color:var(--gold);}
  .hint{font-size:12px;color:#8aa0c2;margin-top:4px;}

  .rules{display:grid;gap:8px;margin-top:6px;}
  .rule{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:12px;padding:9px 12px;}
  .pts{font-family:'Anton';font-size:23px;color:var(--gold);min-width:50px;text-align:center;}
  .rule .d{font-size:13px;color:#d6e0f0;line-height:1.35;}.rule .d b{color:#fff;}

  .lbrow{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:13px;background:rgba(255,255,255,.04);border:1px solid var(--line);margin:7px 0;}
  .lbrow .rank{font-family:'Anton';font-size:20px;width:30px;text-align:center;color:#8aa0c2;}
  .lbrow.r1 .rank{color:var(--gold);}.lbrow.r2 .rank{color:#cdd7e6;}.lbrow.r3 .rank{color:#d98a4a;}
  .lbrow .nm{flex:1;font-weight:700;font-size:15px;}
  .lbrow .nm small{display:block;color:#8aa0c2;font-weight:600;font-size:11px;}
  .lbrow .sc{font-family:'Anton';font-size:24px;color:var(--gold);}
  .lbrow.me{border-color:var(--gold);background:rgba(244,196,48,.08);}

  .savebar{position:fixed;left:0;right:0;bottom:0;z-index:30;padding:11px 14px calc(11px + env(safe-area-inset-bottom));background:linear-gradient(180deg,rgba(6,24,47,0),rgba(6,24,47,.96) 28%);}
  .savebar .inner{max-width:600px;margin:0 auto;display:flex;gap:9px;}
  .savebar .btn{margin:0;}
  .savestatus{position:fixed;right:16px;bottom:calc(74px + env(safe-area-inset-bottom));z-index:31;font-size:11px;color:#8aa0c2;font-family:'Archivo Narrow';font-weight:700;text-transform:uppercase;letter-spacing:.06em;background:rgba(6,24,47,.85);padding:4px 9px;border-radius:8px;opacity:0;transition:.3s;}
  .savestatus.show{opacity:1;}

  .toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%) translateY(20px);background:var(--ink);border:1px solid var(--gold);color:#fff;padding:11px 17px;border-radius:13px;font-weight:700;font-size:13.5px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.3s;z-index:50;text-align:center;max-width:90%;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .step-pill{display:inline-block;font-family:'Archivo Narrow';font-weight:700;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);background:var(--gold);border-radius:6px;padding:2px 8px;margin-bottom:8px;}
  .tiny{font-size:11.5px;color:#8aa0c2;line-height:1.5;}
  .summary-line{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--line);font-size:14px;}
  .summary-line:last-child{border-bottom:0;}.summary-line b{color:var(--gold);}
  .scoreboard{display:flex;align-items:baseline;justify-content:center;gap:8px;margin:4px 0 2px;}
  .scoreboard .big{font-family:'Anton';font-size:46px;color:var(--gold);}
  .scoreboard .lab{font-family:'Archivo Narrow';font-weight:700;text-transform:uppercase;letter-spacing:.1em;font-size:12px;color:#b9c6dc;}
  .pbreak{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px;}
  .pcell{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:11px;padding:9px;text-align:center;}
  .pcell .n{font-family:'Anton';font-size:22px;color:#fff;}
  .pcell .t{font-size:10.5px;color:#8aa0c2;text-transform:uppercase;letter-spacing:.05em;font-family:'Archivo Narrow';font-weight:700;}
  .reveal{opacity:0;transform:translateY(12px);animation:rise .45s ease forwards;}
  @keyframes rise{to{opacity:1;transform:none;}}
  .center{text-align:center;}
  .spin{display:inline-block;width:30px;height:30px;border:3px solid rgba(255,255,255,.2);border-top-color:var(--gold);border-radius:50%;animation:sp 0.8s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
  .overlay{position:fixed;inset:0;z-index:80;background:rgba(3,12,26,.75);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
  .overlay .msg{font-size:13px;color:#c3d0e6;}
</style>
</head>

  <div id="app"></div>
</div>

</div></div>
<div class="savestatus" id="savestatus"></div>
<div class="toast" id="toast"></div>

/* ============================================================
   GROUP TABLE ENGINE
   ============================================================ */
function computeGroupTable(g,res){
  const teams=GROUPS[g];const row={};teams.forEach((t,i)=>row[t]={team:t,pos:i,pld:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0});
  fixturesFor(g).forEach((m,mi)=>{const s=res.group[`${g}-${mi}`];if(!s||s.h==null||s.a==null)return;const[hT,aT]=m,h=+s.h,a=+s.a;
    row[hT].pld++;row[aT].pld++;row[hT].gf+=h;row[hT].ga+=a;row[aT].gf+=a;row[aT].ga+=h;
    if(h>a){row[hT].w++;row[aT].l++;row[hT].pts+=3;}else if(a>h){row[aT].w++;row[hT].l++;row[aT].pts+=3;}else{row[hT].d++;row[aT].d++;row[hT].pts++;row[aT].pts++;}});
  teams.forEach(t=>row[t].gd=row[t].gf-row[t].ga);
  const arr=Object.values(row);arr.sort((x,y)=>y.pts-x.pts||y.gd-x.gd||y.gf-x.gf||x.pos-y.pos);return arr;
}
function groupComplete(g,res){return fixturesFor(g).every((m,mi)=>{const s=res.group[`${g}-${mi}`];return s&&s.h!=null&&s.a!=null;});}
function allGroupsComplete(res){return GL.every(g=>groupComplete(g,res));}

/* ============================================================
   AUTO-BRACKET ENGINE
   ============================================================ */
function winnerOf(mid,res){const s=res.ko[mid];if(!s||s.a==null||s.b==null)return null;
  if(+s.a>+s.b)return s.aTeam;if(+s.b>+s.a)return s.bTeam;                       // decided in 90 mins
  if(s.ea!=null&&s.eb!=null){if(+s.ea>+s.eb)return s.aTeam;if(+s.eb>+s.ea)return s.bTeam;} // decided in extra time
  if(s.pa!=null&&s.pb!=null&&+s.pa!==+s.pb)return(+s.pa>+s.pb)?s.aTeam:s.bTeam;  // decided on penalties
  return null;}
function loserOf(mid,res){const s=res.ko[mid];if(!s||s.a==null||s.b==null)return null;const w=winnerOf(mid,res);if(!w)return null;return w===s.aTeam?s.bTeam:s.aTeam;}
function resolveR32(res){
  const tables={};GL.forEach(g=>tables[g]=computeGroupTable(g,res));const complete=allGroupsComplete(res);
  let slotFill=null;
  if(complete){const thirds=thirdPlaceRanking(res).slice(0,8).map(t=>t.group);const key=thirds.slice().sort().join("");const packed=WC_DATA.combos[key];if(packed){slotFill={};WC_DATA.slotOrder.forEach((s,i)=>slotFill[s]=packed[i]);}}
  function tok(t){if(!complete)return null;if(t.startsWith("W_"))return tables[t[2]][0].team;if(t.startsWith("RU_"))return tables[t[3]][1].team;if(t.startsWith("T_")){if(!slotFill)return null;const slot=Object.keys(WC_DATA.slotmap).find(s=>WC_DATA.slotmap[s]===t);return slotFill[slot]?tables[slotFill[slot]][2].team:null;}return null;}
  const out={};R32_MATCHES.forEach(mid=>{const[x,y]=WC_DATA.r32[mid];out[mid]={aTeam:tok(x),bTeam:tok(y),aTok:x,bTok:y};});
  return {out,complete};
}
function resolveLater(round,res){const out={};KO_LIST[round].forEach(mid=>{const[x,y]=WC_DATA.bracket[mid];const a=x[0]==="L"?loserOf(x.slice(1),res):winnerOf(x,res);const b=y[0]==="L"?loserOf(y.slice(1),res):winnerOf(y,res);out[mid]={aTeam:a,bTeam:b,aTok:x,bTok:y};});return out;}
function resolveStage(stage,res){return stage==="r32"?resolveR32(res).out:resolveLater(stage,res);}

// ============================================================
//  POSSIBLE QUALIFIERS — "X or Y" for an as-yet-unsettled W_/RU_ slot.
//  Enumerates every remaining W/D/L outcome in the group (3^n, n<=6) and finds
//  which teams can still finish 1st (winner) or top-2 (runner-up). Used ONLY to
//  show a shortlist when it has narrowed to EXACTLY TWO teams. Winners & runners-up
//  only — best-third slots are never shortlisted (kept as TBD).
//  Safe by design: where a points-tie is possible it includes all tied teams, so it
//  errs toward staying TBD (3+) rather than wrongly showing a clean two.
// ============================================================
function groupQualifyChances(g,res){
  const teams=GROUPS[g];
  const fix=fixturesFor(g);
  const base={}; teams.forEach(t=>base[t]={pts:0});
  const remaining=[];
  fix.forEach((m,i)=>{
    const cell=res.group[`${g}-${i}`];
    if(cell&&cell.h!=null&&cell.a!=null){
      const[hT,aT]=m,h=+cell.h,a=+cell.a;
      if(h>a)base[hT].pts+=3; else if(a>h)base[aT].pts+=3; else {base[hT].pts++;base[aT].pts++;}
    } else { remaining.push(m); }
  });
  const n=remaining.length;
  const canWin=new Set(), canTop2=new Set();
  const total=Math.pow(3,n);
  for(let mask=0;mask<total;mask++){
    const pts={}; teams.forEach(t=>pts[t]=base[t].pts);
    let m=mask;
    for(let r=0;r<n;r++){
      const out=m%3; m=Math.floor(m/3);
      const[hT,aT]=remaining[r];
      if(out===0)pts[hT]+=3; else if(out===1)pts[aT]+=3; else {pts[hT]++;pts[aT]++;}
    }
    const maxP=Math.max(...teams.map(t=>pts[t]));
    teams.forEach(t=>{ if(pts[t]===maxP) canWin.add(t); });
    teams.forEach(t=>{ const above=teams.filter(o=>pts[o]>pts[t]).length; if(above<=1) canTop2.add(t); });
  }
  return {canWin:[...canWin], canTop2:[...canTop2]};
}
// For a token like "W_A" or "RU_A": if unsettled, return exactly-two shortlist or null.
function slotShortlist(tokenStr,res){
  if(!tokenStr)return null;
  let g,chances;
  if(tokenStr.startsWith("W_")){g=tokenStr[2];chances=groupQualifyChances(g,res).canWin;}
  else if(tokenStr.startsWith("RU_")){g=tokenStr[3];chances=groupQualifyChances(g,res).canTop2;}
  else return null; // best-third (T_) never shortlisted
  if(chances.length===2)return chances;
  return null;
}
// A human-readable label for an UNRESOLVED knockout slot, by round.
//  - R32 source tokens: "Winner of Group A" / "Runner-up of Group A" / "X or Y" shortlist / "Best 3rd"
//  - R16+ source tokens are match numbers (or "L"+num for the 3rd-place feeders): "Winner of Match 73"
function slotLabel(round,mid,side,res){
  if(round==="r32"){
    const tok=WC_DATA.r32[mid][side==="a"?0:1];
    const sl=slotShortlist(tok,res);
    if(sl)return esc(sl[0])+" or "+esc(sl[1]);
    if(tok.startsWith("W_"))return "Winner Group "+tok[2];
    if(tok.startsWith("RU_"))return "Runner-up Group "+tok[3];
    if(tok.startsWith("T_"))return "Best 3rd";
    return "TBD";
  }
  // R16 onwards: feeder is a match number, or L<match> for 3rd-place play-off
  const tok=WC_DATA.bracket[mid][side==="a"?0:1];
  if(tok[0]==="L")return "Loser of Match "+tok.slice(1);
  return "Winner of Match "+tok;
}

const KNOCKOUT_OPEN_MS = Date.parse("2026-06-20T04:00:00Z"); // 05:00 BST Sat 20 Jun
function knockoutsOpen(){ return Date.now() >= KNOCKOUT_OPEN_MS; }
// Friendly text for the knockout open time, derived from the constant so they never drift.
function knockoutOpenText(){
  const d=new Date(KNOCKOUT_OPEN_MS);
  const datePart=d.toLocaleDateString("en-GB",{timeZone:"Europe/London",weekday:"long",day:"numeric",month:"long"});
  let timePart=d.toLocaleTimeString("en-GB",{timeZone:"Europe/London",hour:"numeric",minute:"2-digit",hour12:true}).replace(" ","");
  // determine BST vs GMT label
  const jan=new Date(d.getFullYear(),0,1).getTimezoneOffset();
  // Use Intl to get zone abbreviation
  const tz=new Intl.DateTimeFormat("en-GB",{timeZone:"Europe/London",timeZoneName:"short"}).formatToParts(d).find(p=>p.type==="timeZoneName")?.value||"BST";
  return `${datePart} at ${timePart} ${tz}`;
}
// Per-match kick-off time for a knockout match id (from KO_SCHED), in ms. null if unknown.
function koMatchKickoffMs(mid){
  const s=KO_SCHED[mid]; if(!s) return null;
  // s = [ "YYYY-MM-DD", "HH:MM" ] in UK local time. Build a UTC ms via BST (+1) offset.
  // During the tournament (Jun-Jul) the UK is on BST = UTC+1, so subtract 1h to get UTC.
  return Date.parse(s[0]+"T"+s[1]+":00+01:00");
}
// A specific knockout match is locked once its own kick-off passes, or its result is in.
function koMatchLocked(mid,res){
  const r=res&&res.ko?res.ko[mid]:null;
  if(r&&r.a!=null&&r.b!=null) return true;          // result entered
  const k=koMatchKickoffMs(mid);
  return k!=null && Date.now()>=k;                   // kickoff passed
}

// Golden picks (champion + top scorer) lock at kick-off, or once any group result is in.
function goldenLocked(res){return tournamentStarted() || stageHasAnyResult("groups",res);}
function stageHasAnyResult(stage,res){
  if(stage==="groups")return Object.values(res.group).some(s=>s&&s.h!=null&&s.a!=null);
  return KO_LIST[stage].some(mid=>{const s=res.ko[mid];return s&&s.a!=null&&s.b!=null;});
}
function stageResultsComplete(stage,res){
  if(stage==="groups")return allGroupsComplete(res);
  return KO_LIST[stage].every(mid=>{const s=res.ko[mid];return s&&s.a!=null&&s.b!=null;});
}
// Predictions for a stage are LOCKED once its fixed time passes, OR once real results for it start.
function predLocked(stage,res){
  if(stageTimeLocked(stage))return true;
  return stageHasAnyResult(stage,res);
}
// A stage is UNLOCKED for prediction if it's groups, or — for knockouts — once the
// knockout OPEN gate has passed. All knockout rounds open together at the gate; unresolved
// slots show their feeder ("Winner of Match 73") and resolve live as results are entered.
function stageUnlocked(stage,res){
  if(stage==="groups")return true;
  return knockoutsOpen();   // one gate opens R32, R16, QF, SF, Final together
}
function stageStatus(stage,res){
  if(!stageUnlocked(stage,res))return "waiting";   // previous round not done
  if(predLocked(stage,res))return "locked";        // results started or kickoff passed
  return "open";                                    // predict now
}

/* ============================================================
   SCORING
   ============================================================ */
function scoreLine(ph,pa,ah,aa){
  if(ph==null||pa==null||ah==null||aa==null)return null;
  if(+ph===+ah&&+pa===+aa)return 6;
  const pr=Math.sign(ph-pa),ar=Math.sign(ah-aa);
  return pr===ar?3:0;
}
function norm(s){return (s||"").trim().toLowerCase();}
function scorePlayer(pred,res,actualScorer){
  let total=0,exact=0,result=0,golden=0,gPts=0,koPts=0;
  GL.forEach(g=>fixturesFor(g).forEach((m,mi)=>{const id=`${g}-${mi}`;const p=pred.group[id],a=res.group[id];if(!p||!a)return;const pts=scoreLine(p.h,p.a,a.h,a.a);if(pts!=null){total+=pts;gPts+=pts;if(pts===6)exact++;else if(pts===3)result++;}}));
  Object.keys(KO_NAMES).forEach(rk=>KO_LIST[rk].forEach(mid=>{
    const p=pred.ko[mid],a=res.ko[mid];
    if(!p||!a||a.a==null||a.b==null||p.a==null||p.b==null)return;
    // Position-based scoring: the player's score for the left slot (p.a) is compared to the
    // actual left slot (a.a), regardless of which team filled it. This lets predictions made
    // before teams were known still score correctly once the slot resolves.
    const pl=scoreLine(p.a,p.b,a.a,a.b);
    if(pl!=null){total+=pl;koPts+=pl;if(pl===6)exact++;else if(pl===3)result++;}
  }));
  const champ=winnerOf("104",res);
  if(pred.winner&&champ&&pred.winner===champ){total+=10;golden+=10;}
  if(pred.scorer&&actualScorer&&norm(pred.scorer)===norm(actualScorer)){total+=10;golden+=10;}
  return {total,exact,result,golden,gPts,koPts};
}

/* ============================================================
   LOCAL STATE  (identity + cache; source of truth is Firestore)
   ============================================================ */
const LS="wc26_league_app_v1";
// local = ACTIVE membership {leagueId, playerId, isScorer}
// memberships = ALL leagues this device belongs to [{leagueId, playerId, isScorer, name}]
let local={leagueId:"",playerId:"",isScorer:false};
let memberships=[];
(function initLocal(){
  let saved=null;
  try{saved=JSON.parse(localStorage.getItem(LS));}catch(e){}
  if(saved){
    if(Array.isArray(saved.memberships)){
      memberships=saved.memberships;
      local=saved.active||memberships[0]||{leagueId:"",playerId:"",isScorer:false};
    }else if(saved.leagueId){
      // migrate old single-membership format
      local={leagueId:saved.leagueId,playerId:saved.playerId,isScorer:!!saved.isScorer};
      memberships=[{leagueId:local.leagueId,playerId:local.playerId,isScorer:local.isScorer,name:""}];
    }
  }
})();
function saveLocal(){
  try{
    // keep active flags in sync inside the memberships list
    const m=memberships.find(x=>x.leagueId===local.leagueId);
    if(m){m.playerId=local.playerId;m.isScorer=local.isScorer;}
    localStorage.setItem(LS,JSON.stringify({active:{leagueId:local.leagueId,playerId:local.playerId,isScorer:local.isScorer},memberships}));
  }catch(e){}
}
function rememberMembership(leagueId,playerId,isScorer,name){
  const ex=memberships.find(m=>m.leagueId===leagueId);
  if(ex){ex.playerId=playerId;ex.isScorer=isScorer;if(name)ex.name=name;}
  else memberships.push({leagueId,playerId,isScorer,name:name||""});
}
function forgetMembership(leagueId){memberships=memberships.filter(m=>m.leagueId!==leagueId);}

// In-memory league document
let LG=null;          // {name, scorerName, scorerPass, results:{group,ko,actualScorer}, players:{pid:{name,pred:{...}}}}
let unsub=null;       // firestore listener
let saveTimer=null;

function blankPred(){return {winner:"",scorer:"",scorerCountry:"",group:{},ko:{}};}
function blankResults(){return {group:{},ko:{},actualScorer:"",facts:{},scorers:[],cards:[]};}

/* ============================================================
   FIRESTORE LAYER
   ============================================================ */
function leagueRef(id){return db.collection("leagues").doc(id);}
function randomId(n){const c="ABCDEFGHJKMNPQRSTUVWXYZ23456789";let s="";for(let i=0;i<n;i++)s+=c[Math.floor(Math.random()*c.length)];return s;}

async function waitForFb(){
  let tries=0;
  while(!fbReady&&!fbError&&tries<60){await new Promise(r=>setTimeout(r,100));tries++;}
  if(fbError)throw new Error(fbError);
  if(!fbReady)throw new Error("Could not connect. Check your internet and try again.");
}

async function createLeague(leagueName,scorerName,scorerPass){
  await waitForFb();
  const id=randomId(6);
  const pid=randomId(8);
  const doc={
    name:leagueName, scorerName:scorerName||"Scorer", scorerPass:scorerPass||"",
    createdAt:Date.now(),
    results:blankResults(),
    players:{[pid]:{name:scorerName||"Scorer",pred:blankPred(),joinedAt:Date.now()}}
  };
  await leagueRef(id).set(doc);
  local={leagueId:id,playerId:pid,isScorer:true};
  rememberMembership(id,pid,true,leagueName);
  saveLocal();
  return id;
}
async function joinLeague(id,displayName){
  await waitForFb();
  id=id.trim().toUpperCase();
  // already a member on this device? just switch to it, don't create a duplicate
  const existing=memberships.find(m=>m.leagueId===id);
  if(existing){
    local={leagueId:existing.leagueId,playerId:existing.playerId,isScorer:existing.isScorer};
    saveLocal();
    return id;
  }
  const snap=await leagueRef(id).get();
  if(!snap.exists)throw new Error("No league found with that code.");
  const leagueName=(snap.data()&&snap.data().name)||id;
  const pid=randomId(8);
  await leagueRef(id).update({["players."+pid]:{name:displayName,pred:blankPred(),joinedAt:Date.now()}});
  local={leagueId:id,playerId:pid,isScorer:false};
  rememberMembership(id,pid,false,leagueName);
  saveLocal();
  return id;
}
// Switch the active league to one we're already a member of
function switchToLeague(leagueId){
  const m=memberships.find(x=>x.leagueId===leagueId);
  if(!m)return;
  local={leagueId:m.leagueId,playerId:m.playerId,isScorer:m.isScorer};
  saveLocal();
  LG=null;
  ui.mode="predict";
  listenLeague();
  render();
}
async function listenLeague(){
  // Wait for Firebase anonymous auth to be ready before attaching the
  // Firestore listener — otherwise security rules reject it and the app
  // can hang on "Loading league…" forever (the spinner of doom).
  try{
    await waitForFb();
  }catch(e){
    loadError=e.message||"Could not connect.";
    render();
    return;
  }
  loadError=null;
  if(unsub)unsub();
  let gotData=false;
  // Watchdog: if no data arrives within 9s, show a retry screen instead of spinning forever.
  const watchdog=setTimeout(()=>{ if(!gotData&&!LG){ loadError="Taking longer than expected — tap Retry."; render(); } },9000);
  unsub=leagueRef(local.leagueId).onSnapshot(snap=>{
    gotData=true;clearTimeout(watchdog);
    if(!snap.exists){toast("League not found");return;}
    LG=snap.data();
    if(!LG.results)LG.results=blankResults();
    if(!LG.results.facts)LG.results.facts={};
    if(!LG.results.scorers)LG.results.scorers=[];
    if(!LG.results.cards)LG.results.cards=[];
    if(!LG.players)LG.players={};
    // keep the stored membership label in sync with the real league name
    const mem=memberships.find(x=>x.leagueId===local.leagueId);
    if(mem&&LG.name&&mem.name!==LG.name){mem.name=LG.name;saveLocal();}
    render();
  },err=>{clearTimeout(watchdog);loadError="Connection issue — tap Retry.";render();});
}
// Scorer tools: delete / rename a player
async function deletePlayer(pid){
  await leagueRef(local.leagueId).update({["players."+pid]:firebase.firestore.FieldValue.delete()});
}
async function renamePlayer(pid,newName){
  await leagueRef(local.leagueId).update({["players."+pid+".name"]:newName});
}
function myPred(){ if(!LG||!LG.players[local.playerId])return blankPred(); const p=LG.players[local.playerId].pred; return {winner:p.winner||"",scorer:p.scorer||"",scorerCountry:p.scorerCountry||"",group:p.group||{},ko:p.ko||{}}; }
function myName(){ return LG&&LG.players[local.playerId]?LG.players[local.playerId].name:""; }

// Debounced save of my predictions
function savePredSoon(){
  showSave("Saving…");
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{
      await leagueRef(local.leagueId).update({["players."+local.playerId+".pred"]:myPred()});
      showSave("Saved ✓");
    }catch(e){showSave("Save failed");}
  },700);
}
async function saveResultsSoon(){
  showSave("Saving…");
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{
      await leagueRef(local.leagueId).update({results:LG.results});
      showSave("Saved ✓");
    }catch(e){showSave("Save failed");}
  },700);
}
let saveStatusTimer;
function showSave(t){const el=document.getElementById("savestatus");el.textContent=t;el.classList.add("show");clearTimeout(saveStatusTimer);saveStatusTimer=setTimeout(()=>el.classList.remove("show"),1800);}

   UI STATE
   ============================================================ */
let ui={mode:"predict",stage:"groups",resStage:"groups"};

/* ============================================================
   ROUTER
   ============================================================ */
function render(){
  const app=document.getElementById("app");
  const chip=document.getElementById("leagueChipWrap");
  // Not in a league yet → lobby
  if(!local.leagueId||!LG){
    document.getElementById("savebar").style.display="none";
    chip.innerHTML="";
    if(local.leagueId&&!LG){
      if(loadError){
        app.innerHTML=`<div class="card center"><p class="lead" style="text-align:center;">${esc(loadError)}</p><button class="btn btn-gold" id="retryLoad" style="margin-top:10px;">Retry</button><button class="btn btn-ghost" id="leaveStuck" style="margin-top:8px;">Leave this league</button></div>`;
        const rb=document.getElementById("retryLoad");if(rb)rb.onclick=()=>{loadError=null;render();listenLeague();};
        const lb=document.getElementById("leaveStuck");if(lb)lb.onclick=()=>{
          // escape hatch if a league is genuinely unreachable
          memberships=memberships.filter(m=>m.leagueId!==local.leagueId);
          local={leagueId:"",playerId:"",isScorer:false};saveLocal();loadError=null;
          if(unsub)unsub();LG=null;render();
        };
        return;
      }
      app.innerHTML='<div class="card center"><div class="spin"></div><p class="tiny" style="margin-top:12px;">Loading league…</p></div>';return;
    }
    return renderLobby(app);
  }
  // In a league
  document.getElementById("appTitle").innerHTML=esc(LG.name);
  document.getElementById("appSub").textContent=(local.isScorer?"You are the scorer":"Player")+" · "+myName();
  document.getElementById("savebar").style.display="block";
  chip.innerHTML=`<span class="leaguechip" id="leagueChip" style="cursor:pointer;">🏆 <b>${esc(LG.name)}</b> · code <b>${esc(local.leagueId)}</b>${memberships.length>1?' <span style="color:var(--gold);font-weight:800;">▾</span>':''}</span>`;
  const chipEl=document.getElementById("leagueChip");
  if(chipEl)chipEl.onclick=()=>openLeaguePicker();
  // mode tabs
  const tabs=[["predict","🔮 Predict"],["today","📅 Today"],["standings","🏆 Tables"],["leaderboard","📊 League"],["facts","📋 Facts"],["info","ℹ️ Help"]];
  if(local.isScorer)tabs.splice(1,0,["results","✍️ Results"]);
  // App-wide knockout welcome — a one-time pop-up screen shown on load once knockouts open,
  // so players can't miss that R32 predicting is live and games close one-by-one.
  let html=`<div class="modetabs">`+tabs.map(([k,l])=>`<div class="modetab ${ui.mode===k?'active':''}" data-mode="${k}">${l}</div>`).join("")+`</div><div id="modeBody"></div>`;
  app.innerHTML=html;
  maybeShowKnockoutWelcome();
  app.querySelectorAll(".modetab").forEach(t=>t.onclick=()=>{ui.mode=t.dataset.mode;render();window.scrollTo({top:0,behavior:"smooth"});});
  const body=document.getElementById("modeBody");
  if(ui.mode==="predict")renderPredict(body);
  else if(ui.mode==="results")renderResults(body);
  else if(ui.mode==="standings")renderStandings(body);
  else if(ui.mode==="leaderboard")renderLeaderboard(body);
  else if(ui.mode==="today")renderToday(body);
  else if(ui.mode==="facts")renderFacts(body);
  else if(ui.mode==="info")renderInfo(body);
}

function renderPredict(host){
  const res=LG.results, pred=myPred();
  const gLock=goldenLocked(res);
  const c=document.createElement("div");c.className="card reveal";
  // determine current country for the scorer pick (stored, or inferred if the saved name is in a squad)
  let curCountry=pred.scorerCountry||"";
  if(!curCountry&&pred.scorer){for(const t of ALL_TEAMS){if((SQUADS[t]||[]).includes(pred.scorer)){curCountry=t;break;}}}
  const isOther = pred.scorer && curCountry && !(SQUADS[curCountry]||[]).includes(pred.scorer);
  const countryOpts=`<option value="">— country —</option>`+ALL_TEAMS.map(t=>`<option value="${t}" ${curCountry===t?'selected':''}>${FLAGS[t]||""}  ${t}</option>`).join("");
  c.innerHTML=`<h2>Golden Picks</h2>
    <p class="lead">${gLock?"🔒 Locked — these were set before kick-off (20:00, 11 June). Each correct pick is worth 10 points.":"Lock these in before kick-off (20:00, Thu 11 June). Each correct one is worth 10 points — you can change them until then."}</p>
    <label class="fld">🏆 Champion (+10)</label>
    <select id="wp" ${gLock?'disabled':''}><option value="">— choose —</option>${ALL_TEAMS.map(t=>`<option value="${t}" ${pred.winner===t?'selected':''}>${FLAGS[t]||""}  ${t}</option>`).join("")}</select>
    <label class="fld">👟 Top scorer / Golden Boot (+10)</label>
    <select id="scCountry" ${gLock?'disabled':''}>${countryOpts}</select>
    <select id="scPlayer" ${gLock?'disabled':''} style="margin-top:8px;"></select>
    <input class="txt" id="scOther" placeholder="Type player name" style="margin-top:8px;display:none;" ${gLock?'disabled':''}>
    <p class="hint">Pick the player's country, then the player. Squads aren't final until just before the tournament — if your player isn't listed, choose <b>Other</b> and type the name.</p>`;
  host.appendChild(c);

  const wp=c.querySelector("#wp"), scCountry=c.querySelector("#scCountry"), scPlayer=c.querySelector("#scPlayer"), scOther=c.querySelector("#scOther");
  function fillPlayers(country,selectedName){
    const list=SQUADS[country]||[];
    scPlayer.innerHTML=`<option value="">— player —</option>`+list.map(p=>`<option value="${esc(p)}" ${p===selectedName?'selected':''}>${esc(p)}</option>`).join("")+`<option value="__OTHER__" ${ (selectedName&&!list.includes(selectedName))?'selected':''}>Other (type a name)…</option>`;
    scPlayer.style.display=country?"block":"none";
    const showOther = country && selectedName && !list.includes(selectedName);
    scOther.style.display=showOther?"block":"none";
    if(showOther)scOther.value=selectedName;
  }
  fillPlayers(curCountry, pred.scorer);
  if(!curCountry){scPlayer.style.display="none";scOther.style.display="none";}

  if(!gLock){
    wp.onchange=e=>{LG.players[local.playerId].pred.winner=e.target.value;savePredSoon();};
    scCountry.onchange=e=>{
      const ctry=e.target.value;
      LG.players[local.playerId].pred.scorerCountry=ctry;
      LG.players[local.playerId].pred.scorer="";  // reset player when country changes
      fillPlayers(ctry,"");
      savePredSoon();
    };
    scPlayer.onchange=e=>{
      if(e.target.value==="__OTHER__"){scOther.style.display="block";scOther.value="";scOther.focus();LG.players[local.playerId].pred.scorer="";}
      else{scOther.style.display="none";LG.players[local.playerId].pred.scorer=e.target.value;}
      savePredSoon();
    };
    scOther.oninput=e=>{LG.players[local.playerId].pred.scorer=e.target.value;savePredSoon();};
  }
  // stage chips with lock state
  const bar=document.createElement("div");bar.className="stagebar";
  STAGES.forEach(k=>{
    const st=stageStatus(k,res);
    const ch=document.createElement("div");ch.className="chip"+(ui.stage===k?" active":"")+(st==="waiting"?" locked":"");
    let icon=st==="locked"?'<span class="lk">🔒</span>':st==="waiting"?'<span class="lk">⏳</span>':"";
    ch.innerHTML=STAGE_LABEL[k]+icon;
    ch.onclick=()=>{ui.stage=k;render();window.scrollTo({top:0,behavior:"smooth"});};
    bar.appendChild(ch);
  });
  host.appendChild(bar);
  // banner
  const st=stageStatus(ui.stage,res);
  const banner=document.createElement("div");
  if(st==="waiting"){banner.className="banner wait";banner.innerHTML=`⏳ <b>The knockout bracket opens ${knockoutOpenText()}.</b> From then you can predict every knockout round — Round of 32 through to the Final. Slots show "Winner of Group A" or "Winner of Match 73" and fill in with the real teams as results come in.`;}
  else if(st==="locked"){banner.className="banner lock";banner.innerHTML=`🔒 <b>Predictions for this round are locked</b> — the deadline has passed or results are in. Check the League tab to see how you're doing.`;}
  else{
    banner.className="banner open";
    if(ui.stage==="groups"){
      banner.innerHTML=`✅ <b>Group stage is open.</b> Predict every scoreline below.`;
    } else {
      // Knockouts are now open. Welcome message + how the per-match locking works.
      banner.innerHTML=`🎉 <b>Knockout predictions are open!</b> You can now predict the ${KO_NAMES[ui.stage]} — and every other knockout round, all the way to the Final. Each game <b>locks at its own kick-off</b>, so they close one by one (not all at once) — get your picks in before each match starts. Slots still showing "Winner of Group A" or "Winner of Match 73" will fill in with the real teams as results come in.`;
    }
  }
  host.appendChild(banner);

  if(st==="waiting")return;
  if(ui.stage==="groups")return renderPredictGroups(host,res,st);
  return renderPredictKO(host,ui.stage,res,st);
}

  GL.forEach(g=>{
    const h=document.createElement("div");h.className="group-head";h.innerHTML=`<span class="group-tag">Group ${g}</span><span class="gl"></span>`;host.appendChild(h);

/* ============================================================
   IMPORT GROUP RESULTS FROM PASTED SPREADSHEET
   Accepts tab- or comma-separated rows. Keys off Match ID (e.g. "A-0")
   when present; otherwise matches by Home/Away team names for that group.
   Only applies rows where BOTH scores are numbers; never blanks existing.
   ============================================================ */
function parseImport(text){
  const out=[]; const errors=[];
  const validIds=new Set(); GL.forEach(g=>fixturesFor(g).forEach((m,mi)=>validIds.add(g+"-"+mi)));
  const lines=(text||"").split(/\r?\n/).map(l=>l.trim()).filter(l=>l.length);
  lines.forEach(line=>{
    // split on tab or comma
    const cells=line.split(/\t|,/).map(c=>c.trim());
    if(!cells.length)return;
    // find a match id like A-0 anywhere in the row
    let id=cells.find(c=>/^[A-L]-[0-5]$/.test(c));
    // find the two numeric score cells
    const nums=cells.map((c,i)=>({c,i})).filter(o=>/^\d{1,2}$/.test(o.c));
    if(!id){
      // try to resolve by team names present in the row
      for(const g of GL){const fx=fixturesFor(g);for(let mi=0;mi<fx.length;mi++){const[h,a]=fx[mi];if(cells.includes(h)&&cells.includes(a)){id=g+"-"+mi;break;}}if(id)break;}
    }
    if(!id)return; // skip header / unrecognised rows silently
    if(!validIds.has(id)){errors.push("Unknown match: "+id);return;}
    if(nums.length<2)return; // no scores yet for this game — skip
    // Use the LAST two numeric cells as home, away (handles a numeric in match-id-free rows)
    const h=+nums[nums.length-2].c, a=+nums[nums.length-1].c;
    out.push({id,h,a});
  });
  return {rows:out,errors};
}
function previewImport(text){
  const msg=document.getElementById("impMsg");
  const {rows,errors}=parseImport(text);
  if(!rows.length){msg.innerHTML=`<span style="color:var(--red)">No valid rows found.</span> Make sure you copied the rows including the Match ID column. ${errors.length?("<br>"+errors.join("<br>")):""}`;return;}
  // build human summary
  const lines=rows.map(r=>{const m=findGroupMatch(r.id);return `${m[0]} ${r.h}–${r.a} ${m[1]}`;});
  const warn=errors.length?`<br><span style="color:var(--red)">${errors.join("<br>")}</span>`:"";
  msg.innerHTML=`Found <b>${rows.length}</b> result${rows.length===1?"":"s"} to import:<br>${lines.slice(0,40).join("<br>")}${rows.length>40?"<br>…":""}${warn}<br><br>`;
  const go=document.createElement("button");go.className="btn btn-green";go.textContent=`Confirm import of ${rows.length} result${rows.length===1?"":"s"}`;
  go.onclick=()=>applyImport(rows);
  msg.appendChild(go);
}

function ukToday(){
  // Get current date in UK time as YYYY-MM-DD
  const f=new Intl.DateTimeFormat("en-CA",{timeZone:"Europe/London",year:"numeric",month:"2-digit",day:"2-digit"});
  return f.format(new Date());
}
function prettyDate(iso){
  const [y,m,d]=iso.split("-").map(Number);
  const dt=new Date(Date.UTC(y,m-1,d));
  return dt.toLocaleDateString("en-GB",{timeZone:"UTC",weekday:"long",day:"numeric",month:"long"});
}
function shortDate(iso){
  const [y,m,d]=iso.split("-").map(Number);
  const dt=new Date(Date.UTC(y,m-1,d));
  return dt.toLocaleDateString("en-GB",{timeZone:"UTC",weekday:"short",day:"numeric",month:"short"});
}
function allFixturesByDate(){
  // returns {date: [ {id,kind,home,away,time,resultStr} ]}
  const map={};
  function push(date,obj){(map[date]=map[date]||[]).push(obj);}
  GL.forEach(g=>fixturesFor(g).forEach((m,mi)=>{
    const id=`${g}-${mi}`;const s=SCHEDULE[id];if(!s)return;
    const a=LG.results.group[id];
    push(s[0],{id,kind:"group",home:m[0],away:m[1],time:s[1],
      resultStr:(a&&a.h!=null&&a.a!=null)?`${a.h}–${a.a}`:null});
  }));
  // knockouts: only show once teams resolved; use KO_SCHED dates
  Object.keys(KO_NAMES).forEach(rk=>{
    KO_LIST[rk].forEach(mid=>{
      const s=KO_SCHED[mid];if(!s)return;
      const a=LG.results.ko[mid];
      const guide=(typeof resolveStage==="function")?resolveStage(rk,LG.results):{};
      const aT=(a&&a.aTeam)||guide[mid]?.aTeam||"TBC";
      const bT=(a&&a.bTeam)||guide[mid]?.bTeam||"TBC";
      push(s[0],{id:"KO"+mid,kind:"ko",home:aT,away:bT,time:s[1],roundName:KO_NAMES[rk],
        resultStr:(a&&a.a!=null&&a.b!=null)?`${a.a}–${a.b}`:null});
    });
  });
  return map;
}
function renderToday(host){
  const byDate=allFixturesByDate();
  const allDates=Object.keys(byDate).sort();
  if(ui.todayDate===undefined)ui.todayDate=ukToday();
  // if today has no games, and we're defaulting, snap to the next date that does
  if(!byDate[ui.todayDate]&&ui._todayAuto!==false){
    const next=allDates.find(d=>d>=ui.todayDate);
    ui.todayDate=next||allDates[allDates.length-1]||ui.todayDate;
  }
  const cur=ui.todayDate;

// Take the top N, but include anyone tied with the Nth-place value (so "10 plus ties").
function topWithTies(sortedArr, n, valueFn){
  if(sortedArr.length<=n) return sortedArr;
  const cutoff=valueFn(sortedArr[n-1]); // value at the Nth position
  return sortedArr.filter((item,i)=> i<n || valueFn(item)===cutoff);
}

function importScorers(text){
  const msg=document.getElementById("impScorersMsg");
  const lines=(text||"").split(/\r?\n/).map(l=>l.trim()).filter(l=>l);
  const out=[];
  lines.forEach(line=>{
    const c=line.split(/\t|,/).map(x=>x.trim());
    if(!c.length)return;
    const goalsCell=c.map((x,i)=>({x,i})).filter(o=>/^\d{1,3}$/.test(o.x)).pop();
    if(!goalsCell)return;
    const goals=+goalsCell.x;
    const name=c[0]; if(!name||/player/i.test(name))return;
    const team=c.length>=3?c[1]:"";
    out.push({name,team,goals});
  });
  if(!out.length){msg.innerHTML=`<span style="color:var(--red)">No scorer rows found.</span> Expected: Player, Team, Goals.`;return;}
  LG.results.scorers=out;saveResultsSoon();toast(`Imported ${out.length} scorers`);render();
}
function importFacts(text){
  const msg=document.getElementById("impFactsMsg");
  const lines=(text||"").split(/\r?\n/).map(l=>l.trim()).filter(l=>l);
  let n=0;
  lines.forEach(line=>{
    const c=line.split(/\t/).map(x=>x.trim());
    if(c.length<2)return;
    let id=c.find(x=>/^[A-L]-[0-5]$/.test(x)||/^KO\d{2,3}$/.test(x));
    if(!id)return;
    const idIdx=c.indexOf(id);
    // Everything after the ID. The spreadsheet has extra columns we must skip:
    //  - the Group column (a lone letter A–L)
    //  - the Match column (a fixture name containing " v ")
    // What's left, in order, is: Goalscorers, then Cards.
    const rest=c.slice(idIdx+1).map(x=>x.trim()).filter(x=>{
      if(x==="")return false;
      if(/^[A-L]$/.test(x))return false;             // group letter
      if(/\sv\s/i.test(x)&&!/\d/.test(x))return false; // "Team v Team" with no digits = match name
      return true;
    });
    const scorers=(rest[0]||"").trim();
    const cards=(rest[1]||"").trim();
    if(!scorers&&!cards)return;
    if(!LG.results.facts)LG.results.facts={};
    LG.results.facts[id]={scorers,cards};n++;
  });
  if(!n){msg.innerHTML=`<span style="color:var(--red)">No match facts found.</span> Paste the rows from the Match Facts sheet (Match ID, Group, Match, Goalscorers, Cards) — extra columns are handled automatically.`;return;}
  saveResultsSoon();toast(`Imported facts for ${n} matches`);render();
}
function importCards(text){
  const msg=document.getElementById("impCardsMsg");
  const lines=(text||"").split(/\r?\n/).map(l=>l.trim()).filter(l=>l);
  const out=[];
  lines.forEach(line=>{
    const c=line.split(/\t|,/).map(x=>x.trim());
    if(c.length<2)return;
    // Player, Team, Yellow, Red  (last two numeric)
    const nums=c.map((x,i)=>({x,i})).filter(o=>/^\d{1,3}$/.test(o.x));
    if(nums.length<1)return;
    const name=c[0]; if(!name||/player/i.test(name))return;
    let team="",yellow=0,red=0;
    if(nums.length>=2){yellow=+nums[nums.length-2].x;red=+nums[nums.length-1].x;team=c.length>=4?c[1]:"";}
    else{yellow=+nums[nums.length-1].x;team=c.length>=3?c[1]:"";}
    out.push({name,team,yellow,red});
  });
  if(!out.length){msg.innerHTML=`<span style="color:var(--red)">No card rows found.</span> Expected: Player, Team, Yellow, Red.`;return;}
  LG.results.cards=out;saveResultsSoon();toast(`Imported ${out.length} card records`);render();
}

function lockedStages(res){return STAGES.filter(s=>predLocked(s,res));}
function predResultPts(p,a){ // returns {pred, actual, pts} for a group match
  if(!p||p.h==null||p.a==null)return null;
  if(!a||a.h==null||a.a==null)return {pred:`${p.h}–${p.a}`,actual:null,pts:null};
  const pts=scoreLine(p.h,p.a,a.h,a.a);
  return {pred:`${p.h}–${p.a}`,actual:`${a.h}–${a.a}`,pts};
}
function ptTag(pts){if(pts==null)return `<span class="ptpill zero" style="font-size:11px;">–</span>`;return `<span class="${ptPillClass(pts)}" style="font-size:11px;">${pts}</span>`;}
function openPlayerReveal(pid){
  busy("");const o=document.getElementById("ov");
  const res=LG.results;const pl=LG.players[pid]||{};const pred=pl.pred||{};
  const locked=lockedStages(res);
  let body="";
  if(!locked.length){
    body=`<p class="lead">No rounds are locked yet. Once a round locks, everyone's picks for it appear here.</p>`;
  }else{
    locked.forEach(stage=>{
      if(stage==="groups"){
        let rows="";
        GL.forEach(g=>{
          fixturesFor(g).forEach((m,mi)=>{
            const id=`${g}-${mi}`;const p=(pred.group||{})[id];if(!p||p.h==null||p.a==null)return;
            const a=res.group[id];const pr=predResultPts(p,a);
            rows+=`<div class="summary-line"><span>${short(m[0])} v ${short(m[1])}</span><span><b>${pr.pred}</b>${pr.actual?` <span style="color:#8aa0c2">(act ${pr.actual})</span>`:""} ${ptTag(pr.pts)}</span></div>`;
          });
        });
        body+=`<div class="group-tag" style="display:inline-block;margin:12px 0 4px;">Group stage</div>${rows||'<p class="tiny">No group picks made.</p>'}`;
      }else{
        let rows="";
        KO_LIST[stage].forEach(mid=>{
          const p=(pred.ko||{})[mid];if(!p||p.a==null||p.b==null||!p.aTeam||!p.bTeam)return;
          const a=res.ko[mid];
          let pts=null,act=null;
          if(a&&a.a!=null&&a.b!=null&&a.aTeam&&a.bTeam){
            act=`${a.a}–${a.b}`;
            pts=scoreLine(p.a,p.b,a.a,a.b); // position-based
          }
          rows+=`<div class="summary-line"><span>${short(p.aTeam)} v ${short(p.bTeam)}</span><span><b>${p.a}–${p.b}</b>${act?` <span style="color:#8aa0c2">(act ${act})</span>`:""} ${ptTag(pts)}</span></div>`;
        });
        if(rows)body+=`<div class="group-tag" style="display:inline-block;margin:12px 0 4px;">${KO_NAMES[stage]}</div>${rows}`;
      }
    });
    // golden picks if locked (tournament started)
    if(goldenLocked(res)){
      body+=`<div class="group-tag" style="display:inline-block;margin:12px 0 4px;">Golden picks</div>
        <div class="summary-line"><span>🏆 Champion</span><b>${esc(pred.winner)||"(none)"}</b></div>
        <div class="summary-line"><span>👟 Top scorer</span><b>${esc(pred.scorer)||"(none)"}</b></div>`;
    }
  }
  o.innerHTML=`<div class="card" style="max-width:460px;width:92%;max-height:86vh;overflow:auto;">
    <h2>${esc(pl.name||"Player")}'s predictions</h2>
    <p class="lead">Shown only for rounds that are locked. The number pill is points scored.</p>
    ${body}
    <button class="btn btn-ghost" id="revClose" style="margin-top:12px;">Close</button>
  </div>`;
  o.querySelector("#revClose").onclick=()=>unbusy();
}
// Per-match reveal: everyone's pick for one game (only when that stage is locked)
function openMatchReveal(kind,id){
  const res=LG.results;
  // determine stage of this match
  let stage,label,teams;
  if(kind==="group"){stage="groups";const m=findGroupMatch(id);teams=[m[0],m[1]];label=`${short(m[0])} v ${short(m[1])}`;}
  else{stage=kind;const a=res.ko[id];teams=a?[a.aTeam,a.bTeam]:["?","?"];label=`${short(teams[0]||"TBD")} v ${short(teams[1]||"TBD")}`;}
  if(!predLocked(stage,res)){toast("Picks reveal once this round locks");return;}
  busy("");const o=document.getElementById("ov");
  const rows=Object.keys(LG.players).map(pid=>{
    const pl=LG.players[pid];const pred=pl.pred||{};
    let pickStr="—",pts=null;
    if(kind==="group"){const p=(pred.group||{})[id];if(p&&p.h!=null&&p.a!=null){pickStr=`${p.h}–${p.a}`;const a=res.group[id];if(a&&a.h!=null)pts=scoreLine(p.h,p.a,a.h,a.a);}}
    else{const p=(pred.ko||{})[id];if(p&&p.a!=null&&p.b!=null){pickStr=`${p.a}–${p.b}`;const a=res.ko[id];if(a&&a.a!=null&&a.aTeam){pts=scoreLine(p.a,p.b,a.a,a.b);}}}
    return {name:pl.name,pickStr,pts};
  }).sort((x,y)=>(y.pts||0)-(x.pts||0));
  let actLine="";
  if(kind==="group"){const a=res.group[id];if(a&&a.h!=null)actLine=`Actual result: <b>${a.h}–${a.a}</b>`;}
  else{const a=res.ko[id];if(a&&a.a!=null)actLine=`Actual result: <b>${a.a}–${a.b}</b>`;}
  o.innerHTML=`<div class="card" style="max-width:440px;width:92%;max-height:86vh;overflow:auto;">
    <h2>${label}</h2>
    ${actLine?`<p class="lead">${actLine}</p>`:`<p class="lead">Not played yet.</p>`}
    ${rows.map(r=>`<div class="summary-line"><span>${esc(r.name)}</span><span><b>${r.pickStr}</b> ${ptTag(r.pts)}</span></div>`).join("")}
    <button class="btn btn-ghost" id="mrClose" style="margin-top:12px;">Close</button>
  </div>`;
  o.querySelector("#mrClose").onclick=()=>unbusy();
}


function esc(s){return (s==null?"":(""+s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
let tt;function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(tt);tt=setTimeout(()=>t.classList.remove("show"),2600);}
function busy(msg){
  let o=document.getElementById("ov");
  if(!o){o=document.createElement("div");o.id="ov";o.className="overlay";document.body.appendChild(o);}
  // Always (re)build the spinner content so #ovmsg is guaranteed to exist,
  // even if the overlay was previously filled with settings/other HTML.
  o.innerHTML=`<div class="spin"></div><div class="msg" id="ovmsg"></div>`;
  const m=document.getElementById("ovmsg");
  if(m)m.textContent=msg||"";
}
function unbusy(){const o=document.getElementById("ov");if(o)o.remove();}

document.getElementById("syncBtn").onclick=()=>{toast("Refreshed");render();};
document.getElementById("leaveBtn").onclick=()=>openSettings();

// One-time knockout welcome pop-up. Shows once per device when knockouts open.
const KO_WELCOME_KEY="wc26_ko_welcome_seen_v1";
function maybeShowKnockoutWelcome(){
  if(!knockoutsOpen())return;
  let seen=false; try{seen=localStorage.getItem(KO_WELCOME_KEY)==="1";}catch(e){}
  if(seen||ui._koWelcomeShownThisLoad)return;
  ui._koWelcomeShownThisLoad=true; // don't re-pop on every render within one load
  let o=document.getElementById("ov");
  if(!o){o=document.createElement("div");o.id="ov";o.className="overlay";document.body.appendChild(o);}
  o.style.display="flex";
  o.innerHTML=`<div class="card" style="max-width:430px;width:92%;text-align:center;">
    <div style="font-size:40px;line-height:1;margin-bottom:6px;">🎉</div>
    <h2 style="margin-bottom:8px;">Knockout predictions are open!</h2>
    <p class="lead" style="text-align:left;">You can now predict the <b style="color:#fff;">Round of 32 all the way to the Final</b>.</p>
    <p class="lead" style="text-align:left;">Each game <b style="color:#fff;">locks at its own kick-off</b>, so they close one by one — not all at once. Get your picks in before each match starts.</p>
    <p class="lead" style="text-align:left;">Slots showing "Winner of Group A" or "Winner of Match 73" will fill in with the real teams as results come in.</p>
    <button class="btn btn-gold" id="koWelcomeGotIt" style="margin-top:14px;">Got it — let's predict 🔮</button>
  </div>`;
  const btn=document.getElementById("koWelcomeGotIt");
  if(btn)btn.onclick=()=>{
    try{localStorage.setItem(KO_WELCOME_KEY,"1");}catch(e){}
    o.style.display="none";o.innerHTML="";
    ui.mode="predict";ui.stage="r32";render();   // take them straight to the open R32 predictions
  };
}

async function openLeaguePicker(){
  busy("");const o=document.getElementById("ov");
  // Seed names we already know: the current league from LG, plus any cached names.
  const nameFor={};
  memberships.forEach(m=>{nameFor[m.leagueId]=m.name||"";});
  if(LG&&local.leagueId)nameFor[local.leagueId]=LG.name||nameFor[local.leagueId]||"";
  function rowsHtml(loading){
    return memberships.map(m=>{
      const active=m.leagueId===local.leagueId;
      const nm=nameFor[m.leagueId];
      const title=nm||(loading?`<span style="opacity:.6;">loading…</span>`:esc(m.leagueId));
      return `<div class="lbrow ${active?'me':''}" data-lg="${esc(m.leagueId)}" style="cursor:pointer;">
        <div class="rank">🏆</div>
        <div class="nm">${nm?esc(nm):title}<small>code ${esc(m.leagueId)}${m.isScorer?" · you're the scorer":""}${active?" · current":""}</small></div>
        <div class="sc" style="font-size:15px;color:${active?'var(--gold)':'#8aa0c2'};">${active?'✓':'›'}</div>
      </div>`;
    }).join("");
  }
  function paint(loading){
    o.innerHTML=`<div class="card" style="max-width:440px;width:92%;max-height:86vh;overflow:auto;">
      <h2>Your leagues</h2>
      <p class="lead">Tap a league to switch to it. The one you're in now is marked ✓.</p>
      <div id="lpRows">${rowsHtml(loading)}</div>
      <button class="btn btn-gold" id="lpAdd" style="margin-top:12px;">➕ Join or create another league</button>
      <button class="btn btn-ghost" id="lpClose">Close</button>
    </div>`;
    o.querySelector("#lpClose").onclick=()=>unbusy();
    o.querySelector("#lpAdd").onclick=()=>{
      if(unsub)unsub();LG=null;local={leagueId:"",playerId:"",isScorer:false};
      try{localStorage.setItem(LS,JSON.stringify({active:local,memberships}));}catch(e){}
      unbusy();render();
    };
    o.querySelectorAll("[data-lg]").forEach(row=>row.onclick=()=>{
      const id=row.dataset.lg;
      if(id===local.leagueId){unbusy();return;}
      busy("Switching…");switchToLeague(id);unbusy();
    });
  }
  // Always re-fetch names for leagues other than the current one, so any
  // stale or wrong cached labels (e.g. an old player name) are corrected.
  const toFetch=memberships.map(m=>m.leagueId).filter(id=>id!==local.leagueId);
  paint(toFetch.some(id=>!nameFor[id]));
  if(toFetch.length){
    try{
      const snaps=await Promise.all(toFetch.map(id=>leagueRef(id).get().catch(()=>null)));
      snaps.forEach((snap,i)=>{
        const id=toFetch[i];
        if(snap&&snap.exists){
          const realName=snap.data().name||"";
          if(realName){
            nameFor[id]=realName;
            const mem=memberships.find(x=>x.leagueId===id);
            if(mem)mem.name=realName;
          }
        }
      });
      saveLocal();
      if(document.getElementById("lpRows"))paint(false);
    }catch(e){ if(document.getElementById("lpRows"))paint(false); }
  }
}

function openSettings(){
  const isScorer=local.isScorer;
  busy("");const o=document.getElementById("ov");
  const multi=memberships.length>1;
  o.innerHTML=`<div class="card" style="max-width:440px;width:92%;max-height:86vh;overflow:auto;">
    <h2>League settings</h2>
    <p class="lead">${esc(LG.name)} · code <b>${esc(local.leagueId)}</b></p>
    <button class="btn btn-ghost" id="copyCode">📋 Copy league code</button>
    ${isScorer?`<button class="btn btn-gold" id="managePlayers">👥 Manage players</button>`:`<button class="btn btn-gold" id="claimScorer">🔑 I'm the scorer (enter passcode)</button>`}
    ${multi?`<p class="tiny" style="margin:8px 2px;">🔀 To switch leagues, tap the league name at the top of the screen.</p>`:""}
    <div style="margin:10px 0 2px;font-family:'Archivo Narrow';font-weight:700;letter-spacing:.07em;text-transform:uppercase;font-size:12px;color:var(--gold);">Other</div>
    <button class="btn btn-ghost" id="addAnother">➕ Join or create another league</button>
    <button class="btn btn-ghost" id="switchL">↩︎ Leave this league (on this device)</button>
    <button class="btn btn-ghost" id="closeSet">Close</button>
  </div>`;
  o.querySelector("#copyCode").onclick=()=>{
    const code=local.leagueId;
    try{
      if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(code).then(()=>toast("Code copied: "+code)).catch(()=>toast("Your code is: "+code));}
      else{toast("Your code is: "+code);}
    }catch(e){toast("Your code is: "+code);}
  };
  o.querySelector("#closeSet").onclick=()=>unbusy();
  o.querySelector("#addAnother").onclick=()=>{
    // go to lobby but KEEP memberships; clear only the active pointer
    if(unsub)unsub();LG=null;local={leagueId:"",playerId:"",isScorer:false};
    try{localStorage.setItem(LS,JSON.stringify({active:local,memberships}));}catch(e){}
    unbusy();render();
  };
  o.querySelector("#switchL").onclick=()=>{
    if(confirm("Leave this league on this device? Your predictions stay saved in the league; you can rejoin with the code. (This does not delete you from the league.)")){
      forgetMembership(local.leagueId);
      if(unsub)unsub();LG=null;
      const next=memberships[0];
      local=next?{leagueId:next.leagueId,playerId:next.playerId,isScorer:next.isScorer}:{leagueId:"",playerId:"",isScorer:false};
      saveLocal();unbusy();
      if(local.leagueId){listenLeague();}render();
    }
  };
  const cs=o.querySelector("#claimScorer");
  if(cs)cs.onclick=()=>{
    const pw=prompt("Enter the scorer passcode for "+LG.name+":");
    if(pw==null)return;
    if(pw===LG.scorerPass){local.isScorer=true;saveLocal();toast("Scorer mode unlocked");unbusy();ui.mode="results";render();}
    else toast("Wrong passcode");
  };
  const mp=o.querySelector("#managePlayers");
  if(mp)mp.onclick=()=>openManagePlayers();
}

/* ============================================================
   MANAGE PLAYERS  (scorer only)
   ============================================================ */
function openManagePlayers(){
  busy("");const o=document.getElementById("ov");
  const pids=Object.keys(LG.players||{});
  // sort: empty-prediction (likely duplicates) first so they're easy to clear
  function predCount(p){const pr=(p&&p.pred)||{};let n=0;if(pr.winner)n++;if(pr.scorer)n++;n+=Object.keys(pr.group||{}).length;n+=Object.keys(pr.ko||{}).length;return n;}
  pids.sort((a,b)=>predCount(LG.players[a])-predCount(LG.players[b]));
  const rows=pids.map(pid=>{
    const pl=LG.players[pid]||{};const pc=predCount(pl);const isMe=pid===local.playerId;
    const nm=pl.name||"(no name)";
    const tag=pc===0?`<span style="color:var(--red);">empty — likely a duplicate</span>`:`${pc} prediction${pc===1?"":"s"} saved`;
    return `<div class="lbrow" style="align-items:flex-start;">
      <div class="nm" style="flex:1;">${esc(nm)}${isMe?' <small style="color:var(--gold)">that\u2019s you</small>':''}<small>${tag}</small></div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <button class="btn btn-ghost mp-ren" data-pid="${pid}" style="padding:7px 10px;font-size:12px;margin:0;">Rename</button>
        <button class="btn btn-ghost mp-del" data-pid="${pid}" data-nm="${esc(nm)}" data-empty="${pc===0?1:0}" style="padding:7px 10px;font-size:12px;margin:0;color:#f7b7bd;border-color:rgba(226,55,68,.4);">Delete</button>
      </div>
    </div>`;
  }).join("");
  o.innerHTML=`<div class="card" style="max-width:460px;width:92%;max-height:86vh;overflow:auto;">
    <h2>Manage players</h2>
    <p class="lead">Remove duplicate or unwanted entries, or rename someone. Entries marked <b style="color:var(--red)">empty</b> have made no predictions — usually safe to delete. Deleting is permanent.</p>
    ${rows||'<p class="tiny">No players yet.</p>'}
    <button class="btn btn-ghost" id="backSet" style="margin-top:12px;">‹ Back</button>
  </div>`;
  o.querySelector("#backSet").onclick=()=>openSettings();
  o.querySelectorAll(".mp-del").forEach(b=>b.onclick=async()=>{
    const pid=b.dataset.pid,nm=b.dataset.nm,empty=b.dataset.empty==="1";
    if(pid===local.playerId){if(!confirm("This is YOUR own entry. Delete it anyway? You'd need to rejoin to play."))return;}
    else if(!empty){if(!confirm(`Delete "${nm}"? They have predictions saved. This can't be undone.`))return;}
    else{if(!confirm(`Delete "${nm}" (empty entry)?`))return;}
    busy("Deleting…");
    try{await deletePlayer(pid);toast("Deleted "+nm);}catch(e){toast("Delete failed");}
    // onSnapshot will refresh LG; reopen the manager shortly after
    setTimeout(()=>{unbusy();if(local.leagueId)openManagePlayers();},600);
  });
  o.querySelectorAll(".mp-ren").forEach(b=>b.onclick=async()=>{
    const pid=b.dataset.pid;const cur=LG.players[pid]?.name||"";
    const nn=prompt("New name for this player:",cur);
    if(nn==null)return;const t=nn.trim();if(!t){toast("Name can't be empty");return;}
    busy("Renaming…");
    try{await renamePlayer(pid,t);toast("Renamed to "+t);}catch(e){toast("Rename failed");}
    setTimeout(()=>{unbusy();if(local.leagueId)openManagePlayers();},600);
  });
}

/* ============================================================
   BOOT
   ============================================================ */
(function boot(){
  if(local.leagueId){listenLeague();render();}
  else render();
})();
